name: Watch Upstream Release

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch:
    inputs:
      version:
        description: 'Force a specific version (e.g. 2.1.116). Leave empty for latest.'
        required: false
        type: string

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(npm view @anthropic-ai/claude-code version)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"    >> "$GITHUB_OUTPUT"
          echo "Resolved: $VERSION"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.RELEASE_WORKFLOW_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release $TAG not found — will create."
          fi

      - name: Install Claude Code
        if: steps.check.outputs.exists == 'false'
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate release notes with Claude Code
        if: steps.check.outputs.exists == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          DISABLE_AUTOUPDATER: '1'
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -x

          # ---- pre-flight diagnostics ----
          echo "::group::Environment"
          echo "Node:          $(node --version 2>&1 || echo '<missing>')"
          echo "npm:           $(npm --version 2>&1 || echo '<missing>')"
          echo "claude binary: $(command -v claude || echo '<not on PATH>')"
          echo "claude --version:"
          claude --version 2>&1 || echo "<--version failed>"
          if [ -n "${ANTHROPIC_API_KEY:-}" ]; then
            echo "ANTHROPIC_API_KEY: <set, length=${#ANTHROPIC_API_KEY}>"
          else
            echo "ANTHROPIC_API_KEY: <UNSET>"
          fi
          if [ -n "${ANTHROPIC_BASE_URL:-}" ]; then
            # Host-only, no path or token in query
            echo "ANTHROPIC_BASE_URL host: $(echo "$ANTHROPIC_BASE_URL" | sed -E 's|https?://([^/]+).*|\1|')"
          else
            echo "ANTHROPIC_BASE_URL: <UNSET — using default api.anthropic.com>"
          fi
          echo "Working dir:   $(pwd)"
          echo "Target ver:    $VERSION"
          echo "::endgroup::"

          # Write prompt to file to avoid shell quoting issues with multiline content
          cat > /tmp/prompt.txt << PROMPT_EOF
          Write release notes for **claude-portable v${VERSION}**.

          claude-portable automatically repackages the official Anthropic Claude Code CLI
          (@anthropic-ai/claude-code) into portable, self-contained archives for
          air-gapped or proxy-only servers that cannot run package managers or connect
          to npm at deploy time.

          Step 1 — Use WebFetch to read the upstream Claude Code release notes at:
          https://github.com/anthropics/claude-code/releases/tag/v${VERSION}

          Step 2 — Write the following Markdown document:

          ### Claude Code v${VERSION} — Portable Release

          [One sentence: portable packaging of Claude Code v${VERSION} for 8 platforms,
          designed for air-gapped / proxy-only deployment.]

          ### What's New in Claude Code v${VERSION}

          [Summarize the key changes you read from the upstream release page. Be specific —
          name the features, commands, and bug fixes. Group into 3–5 bullet points.
          Do NOT copy verbatim; distill the highlights.]

          ### Supported Platforms

          | Platform | Archive | Notes |
          |----------|---------|-------|
          | Linux x86-64 (glibc) | .tar.gz | Ubuntu 20.04+, Debian 10+, CentOS 7+ |
          | Linux ARM64 (glibc) | .tar.gz | Ubuntu 20.04 ARM+ |
          | Linux x86-64 (musl) | .tar.gz | Alpine 3.19+ |
          | Linux ARM64 (musl) | .tar.gz | Alpine ARM |
          | macOS Apple Silicon | .tar.gz | macOS 13+, M1/M2/M3 |
          | macOS Intel | .tar.gz | macOS 13+, Intel |
          | Windows x86-64 | .zip | Windows 10+ |
          | Windows ARM64 | .zip | Windows 11 ARM |

          ### Quick Start

          \`\`\`bash
          tar xzf claude-portable-linux-x64-v${VERSION}.tar.gz
          export ANTHROPIC_API_KEY=sk-ant-...
          export HTTPS_PROXY=http://your-proxy:8080   # if behind a proxy
          ./claude-portable-linux-x64-v${VERSION}/claude --version
          \`\`\`

          ### Portable Packaging Notes

          - The launcher script injects \`DISABLE_AUTOUPDATER=1\` automatically — the binary never attempts self-update.
          - No Node.js, npm, or any package manager is needed on the target machine at runtime.
          - Standard proxy environment variables (\`HTTPS_PROXY\`, \`HTTP_PROXY\`, \`NO_PROXY\`, \`NODE_EXTRA_CA_CERTS\`) are forwarded transparently.

          Keep the entire document under 550 words. Output ONLY the Markdown release notes.
          Do NOT include any meta-commentary, notes about the generation process, observations
          about tool output, or warnings. The output is used verbatim as a GitHub release body.
          PROMPT_EOF

          echo "::group::Prompt"
          echo "Prompt size: $(wc -c < /tmp/prompt.txt) bytes"
          echo "--- head ---"
          head -10 /tmp/prompt.txt
          echo "--- tail ---"
          tail -10 /tmp/prompt.txt
          echo "::endgroup::"

          # Invoke claude. Defuse v2.1.140+ stdin-wait warning by closing stdin
          # explicitly with `< /dev/null`. Capture stderr to its own file and
          # write a debug log so we can post-mortem any silent exit. We disable
          # `-e` around the invocation so the diagnostic dumps always run.
          set +e
          claude \
            --debug-file /tmp/claude-debug.log \
            --model claude-opus-4-7 \
            --allowedTools WebFetch \
            --output-format text \
            -p "$(cat /tmp/prompt.txt)" \
            < /dev/null \
            > /tmp/release-notes.md \
            2> /tmp/claude-stderr.log
          CLAUDE_EXIT=$?
          set -e

          echo "::group::claude stderr"
          cat /tmp/claude-stderr.log 2>/dev/null || echo "<no stderr file>"
          echo "::endgroup::"

          echo "::group::claude stdout (release-notes.md, $(wc -c < /tmp/release-notes.md 2>/dev/null || echo 0) bytes)"
          cat /tmp/release-notes.md 2>/dev/null || echo "<no stdout file>"
          echo "::endgroup::"

          echo "::group::claude debug log (last 300 lines)"
          tail -300 /tmp/claude-debug.log 2>/dev/null || echo "<no debug log>"
          echo "::endgroup::"

          echo "claude exit code: $CLAUDE_EXIT"

          if [ "$CLAUDE_EXIT" -ne 0 ]; then
            echo "::error::claude exited with code $CLAUDE_EXIT"
            exit "$CLAUDE_EXIT"
          fi

          if [ ! -s /tmp/release-notes.md ]; then
            echo "::error::release-notes.md is empty after claude succeeded — refusing to publish"
            exit 1
          fi

          # Append attribution footer
          printf '\n\n---\n*Generated by [Claude Code](https://claude.ai/code) (claude-opus-4-7)*\n' \
            >> /tmp/release-notes.md

          echo "=== Final release notes ==="
          cat /tmp/release-notes.md

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_WORKFLOW_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title       "Claude Code ${{ steps.version.outputs.tag }}" \
            --notes-file  /tmp/release-notes.md \
            --repo        "${{ github.repository }}"
          echo "Created release ${{ steps.version.outputs.tag }}"
