name: Watch Upstream Release

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch:
    inputs:
      version:
        description: 'Force a specific version (e.g. 2.1.116). Leave empty for latest.'
        required: false
        type: string

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(npm view @anthropic-ai/claude-code version)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"    >> "$GITHUB_OUTPUT"
          echo "Resolved: $VERSION"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.RELEASE_WORKFLOW_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release $TAG not found — will create."
          fi

      - name: Setup Python
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        if: steps.check.outputs.exists == 'false'
        run: pip install anthropic

      - name: Gather upstream npm metadata
        if: steps.check.outputs.exists == 'false'
        run: |
          npm view "@anthropic-ai/claude-code@${{ steps.version.outputs.version }}" --json \
            > /tmp/npm-info.json
          echo "npm metadata saved."

      - name: Generate release notes with Claude
        if: steps.check.outputs.exists == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 scripts/generate-release-notes.py \
            --version  "${{ steps.version.outputs.version }}" \
            --npm-info /tmp/npm-info.json \
            --output   /tmp/release-notes.md

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_WORKFLOW_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title       "Claude Code ${{ steps.version.outputs.tag }}" \
            --notes-file  /tmp/release-notes.md \
            --repo        "${{ github.repository }}"
          echo "Created release ${{ steps.version.outputs.tag }}"
