name: Build Portable

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 2.1.116). Leave empty to use latest npm version.'
        required: false
        type: string

# Common matrix for build + verify. Each verify runs in a clean environment
# (Docker for Linux, fresh workdir for macOS/Windows) using ONLY the artifact
# produced by the build stage.

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Stage 1: BUILD (8 platforms in parallel)
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner:   ubuntu-22.04
            archive:  tar.gz
          - platform: linux-arm64
            runner:   ubuntu-22.04-arm
            archive:  tar.gz
          - platform: linux-x64-musl
            runner:   ubuntu-22.04
            archive:  tar.gz
          - platform: linux-arm64-musl
            runner:   ubuntu-22.04-arm
            archive:  tar.gz
          - platform: darwin-arm64
            runner:   macos-15
            archive:  tar.gz
          - platform: darwin-x64
            runner:   macos-15-intel
            archive:  tar.gz
          - platform: win32-x64
            runner:   windows-2022
            archive:  zip
          - platform: win32-arm64
            runner:   windows-11-arm
            archive:  zip

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION=$(npm view @anthropic-ai/claude-code version)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved: $VERSION"

      - name: Build portable package
        shell: bash
        run: |
          node scripts/build-portable.mjs \
            --version  "${{ steps.version.outputs.version }}" \
            --platform "${{ matrix.platform }}" \
            --output   dist

      - name: Compute SHA256
        shell: bash
        run: |
          cd dist
          if command -v sha256sum &>/dev/null; then
            sha256sum "claude-portable-${{ matrix.platform }}-v${{ steps.version.outputs.version }}.${{ matrix.archive }}" \
              > "claude-portable-${{ matrix.platform }}-v${{ steps.version.outputs.version }}.${{ matrix.archive }}.sha256"
          else
            shasum -a 256 "claude-portable-${{ matrix.platform }}-v${{ steps.version.outputs.version }}.${{ matrix.archive }}" \
              > "claude-portable-${{ matrix.platform }}-v${{ steps.version.outputs.version }}.${{ matrix.archive }}.sha256"
          fi
          cat "claude-portable-${{ matrix.platform }}-v${{ steps.version.outputs.version }}.${{ matrix.archive }}.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-portable-${{ matrix.platform }}
          path: |
            dist/claude-portable-${{ matrix.platform }}-*.${{ matrix.archive }}
            dist/claude-portable-${{ matrix.platform }}-*.sha256
          retention-days: 7
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────
  # Stage 2: VERIFY — load each artifact in a clean environment
  # ──────────────────────────────────────────────────────────────────────────
  verify:
    name: Verify ${{ matrix.platform }}
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # glibc Linux and macOS run natively in a fresh workdir.
          - { platform: linux-x64,         runner: ubuntu-22.04,     archive: tar.gz, mode: native  }
          - { platform: linux-arm64,       runner: ubuntu-22.04-arm, archive: tar.gz, mode: native  }
          # musl binaries cannot run on a glibc host; use Alpine Docker.
          - { platform: linux-x64-musl,    runner: ubuntu-22.04,     archive: tar.gz, mode: alpine  }
          - { platform: linux-arm64-musl,  runner: ubuntu-22.04-arm, archive: tar.gz, mode: alpine  }
          - { platform: darwin-arm64,      runner: macos-15,         archive: tar.gz, mode: native  }
          - { platform: darwin-x64,        runner: macos-15-intel,   archive: tar.gz, mode: native  }
          - { platform: win32-x64,         runner: windows-2022,     archive: zip,    mode: windows }
          - { platform: win32-arm64,       runner: windows-11-arm,   archive: zip,    mode: windows }

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: claude-portable-${{ matrix.platform }}
          path: artifact/

      - name: List artifact
        shell: bash
        run: ls -lh artifact/

      - name: Verify SHA256
        shell: bash
        run: |
          cd artifact
          if command -v sha256sum &>/dev/null; then
            sha256sum -c *.sha256
          else
            shasum -a 256 -c *.sha256
          fi
          echo "✓ Checksum verified"

      # ── Native Linux / macOS: extract in a fresh workdir on the runner ─────
      - name: Verify — native (fresh workdir)
        if: matrix.mode == 'native'
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISABLE_AUTOUPDATER: '1'
        run: |
          ARCHIVE=$(ls artifact/claude-portable-${{ matrix.platform }}-*.tar.gz)
          FILENAME=$(basename "$ARCHIVE")
          BASENAME="${FILENAME%.tar.gz}"

          CLEAN_DIR="${RUNNER_TEMP:-/tmp}/verify-clean"
          rm -rf "$CLEAN_DIR"
          mkdir -p "$CLEAN_DIR"
          cp "$ARCHIVE" "$CLEAN_DIR/"
          cd "$CLEAN_DIR"

          tar xzf "$FILENAME"

          echo "=== Test 1: --version ==="
          "./$BASENAME/claude" --version
          echo "✓ --version passed"

          echo "=== Test 2: API call ==="
          "./$BASENAME/claude" --model haiku -p "Reply with exactly the text: SMOKE_TEST_OK" 2>&1 | tee out.txt
          grep -q SMOKE_TEST_OK out.txt
          echo "✓ API test passed"

      # ── musl Linux: extract in a CLEAN Alpine container ────────────────────
      - name: Verify — musl (Alpine Docker)
        if: matrix.mode == 'alpine'
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARCHIVE=$(ls artifact/claude-portable-${{ matrix.platform }}-*.tar.gz)
          FILENAME=$(basename "$ARCHIVE")
          BASENAME="${FILENAME%.tar.gz}"
          ABS_ARTIFACT=$(realpath artifact)

          echo "=== Test 1: extract + --version in clean alpine:3.19 ==="
          docker run --rm \
            -v "$ABS_ARTIFACT:/in:ro" \
            -e DISABLE_AUTOUPDATER=1 \
            -e FILENAME="$FILENAME" \
            -e BASENAME="$BASENAME" \
            alpine:3.19 \
            sh -c 'apk add --no-cache libgcc libstdc++ > /dev/null 2>&1 && cd /tmp && cp "/in/$FILENAME" . && tar xzf "$FILENAME" && "./$BASENAME/claude" --version'

          echo ""
          echo "=== Test 2: API call with real key ==="
          docker run --rm \
            -v "$ABS_ARTIFACT:/in:ro" \
            -e DISABLE_AUTOUPDATER=1 \
            -e ANTHROPIC_API_KEY \
            -e FILENAME="$FILENAME" \
            -e BASENAME="$BASENAME" \
            alpine:3.19 \
            sh -c 'apk add --no-cache libgcc libstdc++ > /dev/null 2>&1 && cd /tmp && cp "/in/$FILENAME" . && tar xzf "$FILENAME" && "./$BASENAME/claude" --model haiku -p "Reply with exactly the text: SMOKE_TEST_OK" 2>&1 | tee out.txt && grep -q SMOKE_TEST_OK out.txt'
          echo "✓ API test passed"

      # ── Windows: extract in a FRESH directory on the runner ────────────────
      - name: Verify — Windows (fresh workdir)
        if: matrix.mode == 'windows'
        shell: pwsh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISABLE_AUTOUPDATER: '1'
        run: |
          $Archive = (Get-ChildItem artifact -Filter "claude-portable-${{ matrix.platform }}-*.zip" | Select-Object -First 1).FullName
          $BaseName = [System.IO.Path]::GetFileNameWithoutExtension($Archive)

          $CleanDir = Join-Path $env:RUNNER_TEMP "verify-clean"
          if (Test-Path $CleanDir) { Remove-Item $CleanDir -Recurse -Force }
          New-Item -ItemType Directory -Path $CleanDir | Out-Null
          Copy-Item $Archive -Destination $CleanDir
          Set-Location $CleanDir

          Expand-Archive -Path (Join-Path $CleanDir (Split-Path -Leaf $Archive)) -DestinationPath . -Force

          $ClaudeCmd = Join-Path $CleanDir "$BaseName\claude.cmd"

          & $ClaudeCmd --version
          if ($LASTEXITCODE -ne 0) { Write-Error "--version failed"; exit 1 }
          Write-Host "✓ --version passed"

          $out = & $ClaudeCmd --model haiku -p "Reply with exactly the text: SMOKE_TEST_OK" 2>&1 | Out-String
          Write-Host $out
          if ($out -notmatch "SMOKE_TEST_OK") {
            Write-Error "API test failed"; exit 1
          }
          Write-Host "✓ API test passed"

  # ──────────────────────────────────────────────────────────────────────────
  # Stage 3: PUBLISH — only on release events; upload assets + regenerate README
  # ──────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish & Update README
    needs: verify
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_WORKFLOW_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_WORKFLOW_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          find artifacts/ -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sha256" \) \
            | xargs gh release upload "$TAG" \
                --clobber \
                --repo "${{ github.repository }}"
          echo "✓ Uploaded assets for $TAG"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Jinja2
        run: pip install jinja2

      - name: Regenerate README
        env:
          GH_TOKEN: ${{ secrets.RELEASE_WORKFLOW_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          gh release view "$TAG" \
            --repo "${{ github.repository }}" \
            --json tagName,name,publishedAt,url,assets \
            > /tmp/release.json

          python3 scripts/render-readme.py \
            --release    /tmp/release.json \
            --repo       "${{ github.repository }}" \
            --output-en  README.md \
            --output-zh  README_zh.md

      - name: Commit README changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md README_zh.md
          if git diff --staged --quiet; then
            echo "README unchanged — nothing to commit."
          else
            git commit -m "docs: update README for ${{ github.event.release.tag_name }} [skip ci]"
            git push
          fi
